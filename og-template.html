<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #0d0d1a;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 60px 80px;
      overflow: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(168, 85, 247, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 30%, rgba(56, 189, 248, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(236, 72, 153, 0.08) 0%, transparent 50%);
      pointer-events: none;
    }
    .left {
      position: relative;
      z-index: 1;
      max-width: 650px;
    }
    .logo {
      font-size: 52px;
      font-weight: 900;
      background: linear-gradient(135deg, #a855f7, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }
    .tagline {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 16px;
    }
    .sub {
      font-size: 18px;
      color: rgba(255,255,255,0.6);
      line-height: 1.5;
    }
    .right {
      position: relative;
      z-index: 1;
      flex-shrink: 0;
    }
    .right img {
      width: 280px;
      height: 280px;
      object-fit: cover;
      border-radius: 32px;
      box-shadow: 0 0 60px rgba(168, 85, 247, 0.3), 0 0 120px rgba(168, 85, 247, 0.1);
    }
    .glow {
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168,85,247,0.25) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
    }
  </style>
</head>
<body>
  <div class="left">
    <div class="logo">ScaleLab AI</div>
    <div class="tagline">Turn ideas into apps,<br>automations, and income with AI.</div>
    <div class="sub">No code. No tech background. Just execution.</div>
  </div>
  <div class="right">
    <div class="glow"></div>
    <img src="images/bot.png" alt="ScaleLab AI Bot">
  </div>
</body>
</html>
